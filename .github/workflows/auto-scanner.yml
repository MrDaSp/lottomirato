name: BetMirato Auto Scanner v2

on:
  schedule:
    # Esegue alle 10:00 e 17:00 ora italiana (8:00 e 15:00 UTC) per intercettare gli infortuni last-minute
    - cron: '0 8,15 * * *'
  workflow_dispatch:

jobs:
  scan_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scanner v2
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scanner.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add valuebets.json team_cache.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Scanner v2: aggiornamento Value Bets + cache" && git push)
