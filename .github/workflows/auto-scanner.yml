name: BetMirato Auto Scanner

on:
  schedule:
    # Esegue questo script alle 4:00, 10:00 e 16:00 UTC (ora italiana: 6:00, 12:00, 18:00)
    - cron: '0 4,10,16 * * *'
  # Consente anche l'esecuzione manuale del Workflow dalla linguetta Actions
  workflow_dispatch:

jobs:
  scan_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Auto Scanner
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scanner.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add valuebets.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Scanner: aggiornamento Value Bets" && git push)
